<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Endless Swinger</title>
    <style>
        /* CSS Reset and Mobile Optimizations */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #e5e5e5; 
            font-family: 'Courier New', Courier, monospace; 
            /* Prevent all default touch actions (scrolling, zooming, etc) */
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        
        canvas { 
            display: block; 
            touch-action: none; 
        }
        
        /* UI Layer */
        #uiLayer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; /* Let clicks pass through to canvas when UI is hidden */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100;
        }
        
        .hidden { display: none !important; }
        
        .panel { 
            background: rgba(138, 43, 226, 0.95); 
            padding: 30px 40px; 
            border-radius: 8px; 
            text-align: center; 
            color: white; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            pointer-events: auto; /* Re-enable clicks for the panel itself */
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
        }
        
        h1 { margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 36px;}
        
        .btn-red { 
            background: #ff4d4d; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 20px; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 5px; 
            text-transform: uppercase; 
            margin: 10px 0 0 0; 
            width: 100%;
            transition: transform 0.1s, background-color 0.1s; 
        }
        .btn-red:active { transform: scale(0.97); background-color: #e63939; }
        
        .score-display { 
            position: absolute; 
            top: 20px; right: 20px; 
            font-size: 32px; 
            font-weight: bold; 
            color: white; 
            text-shadow: 2px 2px 0 #000;
        }
        
        .motivational-text { 
            background: rgba(255,255,255,0.2); 
            padding: 15px; 
            border-radius: 5px; 
            margin: 20px 0; 
            border: 2px dashed rgba(255,255,255,0.5); 
        }

        /* New Menu Styles */
        .menu-group { margin-bottom: 20px; text-align: left; }
        .menu-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; text-align: center;}
        input[type="text"] { width: 100%; padding: 12px; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: bold; border: 2px solid white; background: rgba(0,0,0,0.2); color: white; border-radius: 4px; outline: none; text-align: center; text-transform: uppercase;}
        input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
        input[type="color"] { -webkit-appearance: none; border: 2px solid white; width: 100%; height: 50px; border-radius: 4px; cursor: pointer; background: rgba(0,0,0,0.2); padding: 5px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px;}

        /* Responsive Mobile Adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            .panel { padding: 20px; }
            .btn-red { font-size: 18px; padding: 12px 20px; }
            .score-display { font-size: 26px; top: 15px; right: 15px; }
            input[type="text"] { font-size: 16px; }
            .motivational-text { font-size: 14px; padding: 10px; }
            #finalScore { font-size: 40px !important; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <!-- Start Screen / Main Menu -->
        <div id="startScreen" class="panel">
            <h1>SWINGERS</h1>
            
            <div class="menu-group">
                <input type="text" id="playerNameInput" placeholder="ENTER NAME" maxlength="15">
            </div>
            
            <div class="menu-group">
                <label for="playerColorInput">CHOOSE YOUR COLOR</label>
                <input type="color" id="playerColorInput" value="#4db8b8">
            </div>

            <p style="font-size: 14px; margin-bottom: 20px; color: #ddd;">Tap & Hold to Swing<br>OR<br>Press Spacebar</p>
            <button class="btn-red" id="btnStart">PLAY GAME</button>
        </div>
        
        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="panel hidden">
            <h1>GAME OVER !!!</h1>
            <div class="motivational-text">
                <strong>STAY HOPEFUL!!</strong><br>
                IT IS NOT EASY BUT<br>
                ----------------<br>
                <strong>YOU CAN DO IT</strong>
            </div>
            <p style="font-size: 18px; margin-bottom: 5px; text-transform: uppercase;"><span id="finalPlayerName">PLAYER</span>'S SCORE:</p>
            <p style="font-size: 48px; font-weight: bold; margin: 0 0 20px 0; color: #ffeb3b; text-shadow: 2px 2px 0 #000;" id="finalScore">0</p>
            <button class="btn-red" id="btnReplay">REPLAY ↻</button>
        </div>
        
        <div id="scoreHUD" class="score-display hidden">0</div>
    </div>

<script>
    // --- Configuration & Constants ---
    const CONSTANTS = {
        GRAVITY: 0.5,
        SWING_TENSION: 0.04,
        BASE_FORWARD_SPEED: 3.5,    // Starting minimum speed (Slower)
        MAX_FORWARD_SPEED: 9,       // Max minimum speed it can reach later
        BASE_MAX_SPEED: 14,         // Starting maximum speed limit
        ABSOLUTE_MAX_SPEED: 25,     // Absolute maximum speed limit
        MAX_ROPE_LENGTH: 400,       // Max distance a player can grab an anchor (Dynamic)
        BORDER_HEIGHT: 50,
        ANCHOR_SPACING_MIN: 150,    // Dynamic
        ANCHOR_SPACING_MAX: 350,    // Dynamic
        TARGET_FPS: 60,
        FIXED_TIME_STEP: 1000 / 60  // ~16.66ms
    };

    // --- Core Variables ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiStart = document.getElementById('startScreen');
    const uiGameOver = document.getElementById('gameOverScreen');
    const scoreHUD = document.getElementById('scoreHUD');
    const finalScoreEl = document.getElementById('finalScore');

    let width, height;
    let gameState = 'START'; // 'START', 'PLAYING', 'GAMEOVER'
    let score = 0;
    let cameraX = 0;
    
    // Time tracking for consistent physics
    let lastTime = 0;
    let accumulator = 0;
    let animationFrameId;

    const player = { x: 0, y: 0, vx: 0, vy: 0, size: 24, color: '#4db8b8' };
    let anchors = [];
    let activeAnchor = null;
    let nearestAnchor = null; // Used for UI highlighting
    let isInputDown = false;
    let playerName = 'PLAYER';

    // Load saved preferences on startup
    window.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('swingerName');
        const savedColor = localStorage.getItem('swingerColor');
        if (savedName) {
            document.getElementById('playerNameInput').value = savedName;
            playerName = savedName;
        }
        if (savedColor) {
            document.getElementById('playerColorInput').value = savedColor;
            player.color = savedColor;
        }
    });

    // --- Initialization & Resizing ---
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        // Dynamically adjust gameplay variables for Mobile vs Desktop
        // Use the larger dimension so portrait mobile still gets a decent rope length
        let referenceDimension = Math.max(width, height);
        CONSTANTS.MAX_ROPE_LENGTH = Math.min(referenceDimension * 0.6, 550); 
        
        // Closer anchor spacing for narrower screens (mobile portrait)
        CONSTANTS.ANCHOR_SPACING_MIN = Math.min(width * 0.4, 200);
        CONSTANTS.ANCHOR_SPACING_MAX = Math.min(width * 0.8, 400);
    }
    window.addEventListener('resize', resize);
    resize();

    function initGame() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        // Grab settings from UI menu
        const inputName = document.getElementById('playerNameInput').value.trim();
        playerName = inputName !== '' ? inputName : 'PLAYER';
        player.color = document.getElementById('playerColorInput').value;
        
        // Save to local storage for convenience
        localStorage.setItem('swingerName', playerName);
        localStorage.setItem('swingerColor', player.color);

        player.x = width * 0.2;
        player.y = height / 2;
        player.vx = CONSTANTS.BASE_FORWARD_SPEED;
        player.vy = -3; // Gentler jump to start
        
        cameraX = 0;
        score = 0;
        anchors = [];
        activeAnchor = null;
        nearestAnchor = null;
        isInputDown = false;
        
        lastTime = performance.now();
        accumulator = 0;
        
        // Initial Anchor Generation
        let nextX = player.x + 150;
        for(let i = 0; i < 10; i++) {
            generateAnchor(nextX);
            nextX += CONSTANTS.ANCHOR_SPACING_MIN + Math.random() * (CONSTANTS.ANCHOR_SPACING_MAX - CONSTANTS.ANCHOR_SPACING_MIN);
        }
        
        scoreHUD.innerText = score;
        gameState = 'PLAYING';
        
        uiStart.classList.add('hidden');
        uiGameOver.classList.add('hidden');
        scoreHUD.classList.remove('hidden');
        
        animationFrameId = requestAnimationFrame(gameLoop);
    }

    function generateAnchor(xPos) {
        // Ensure anchors spawn in the upper portion of the screen 
        // so the player has room to swing underneath without hitting the floor!
        const safeTop = CONSTANTS.BORDER_HEIGHT + 30; // Just below the ceiling teeth
        
        // Limit the lowest possible spawn point to the upper 45% of the screen height
        // (Guarantee at least 150px of random variance even on very tiny screens)
        const maxSpawnDepth = Math.max(safeTop + 150, height * 0.45);
        const spawnRange = maxSpawnDepth - safeTop;
        
        anchors.push({
            x: xPos,
            y: safeTop + (Math.random() * spawnRange)
        });
    }

    function gameOver() {
        if (gameState === 'GAMEOVER') return;
        gameState = 'GAMEOVER';
        isInputDown = false;
        activeAnchor = null;
        nearestAnchor = null;
        
        uiGameOver.classList.remove('hidden');
        scoreHUD.classList.add('hidden');
        document.getElementById('finalPlayerName').innerText = playerName;
        finalScoreEl.innerText = score;
    }

    // --- Input Handling (Overhauled for flawless Touch support) ---
    function handleInputDown(e) {
        if (gameState !== 'PLAYING') return;
        
        // Keyboard checks
        if (e.type === 'keydown') {
            if (e.code === 'Space') e.preventDefault(); 
            else return; // Ignore other keys
        }
        
        if (isInputDown) return; // Prevent multi-firing
        isInputDown = true;
        
        // Find nearest valid anchor
        activeAnchor = null;
        let minDist = CONSTANTS.MAX_ROPE_LENGTH; // Enforce max distance
        
        for (let a of anchors) {
            // Anchor must be mostly in front of player
            if (a.x > player.x - 50) {
                let dist = Math.hypot(a.x - player.x, a.y - player.y);
                if (dist < minDist) {
                    minDist = dist;
                    activeAnchor = a;
                }
            }
        }
    }

    function handleInputUp(e) {
        if (e.type === 'keyup' && e.code !== 'Space') return;
        isInputDown = false;
        activeAnchor = null;
    }

    // 1. Global Pointer Events (Bypasses UI Layer ghosting)
    window.addEventListener('pointerdown', (e) => {
        // Only trigger swing if the user didn't tap inside a menu panel
        if (e.target.closest && e.target.closest('.panel')) return;
        handleInputDown(e);
    });
    window.addEventListener('pointerup', handleInputUp);
    window.addEventListener('pointercancel', handleInputUp); // Catch interrupted touches
    
    // 2. Explicit Touch Events for older/stubborn mobile browsers (Safari)
    window.addEventListener('touchstart', (e) => {
        if (e.target.closest && e.target.closest('.panel')) return;
        if (e.cancelable) e.preventDefault(); // HARD stop on pull-to-refresh & gestures
        handleInputDown(e);
    }, { passive: false });
    window.addEventListener('touchend', handleInputUp, { passive: false });
    window.addEventListener('touchcancel', handleInputUp, { passive: false });
    
    // 3. Standard Keyboard fallbacks
    window.addEventListener('keydown', handleInputDown, { passive: false });
    window.addEventListener('keyup', handleInputUp);
    
    // 4. UI Button Bindings (Responsive to both Click and Touch)
    function bindGameButton(id) {
        const btn = document.getElementById(id);
        btn.addEventListener('click', initGame);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevents "ghost click" from double-firing
            initGame();
        }, { passive: false });
    }
    bindGameButton('btnStart');
    bindGameButton('btnReplay');

    // --- Physics Update (Fixed Timestep) ---
    function update() {
        if (gameState !== 'PLAYING') return;

        // 1. Find nearest anchor for visual feedback (even when not clicking)
        nearestAnchor = null;
        let closestDist = CONSTANTS.MAX_ROPE_LENGTH;
        for (let a of anchors) {
            if (a.x > player.x - 50) {
                let d = Math.hypot(a.x - player.x, a.y - player.y);
                if (d < closestDist) { closestDist = d; nearestAnchor = a; }
            }
        }

        // 2. Apply Gravity
        player.vy += CONSTANTS.GRAVITY;

        // 3. Apply Swing Physics
        if (isInputDown && activeAnchor) {
            let dx = activeAnchor.x - player.x;
            let dy = activeAnchor.y - player.y;
            
            player.vx += dx * CONSTANTS.SWING_TENSION;
            player.vy += dy * CONSTANTS.SWING_TENSION;
            
            // Counteract gravity slightly while swinging to allow upward momentum
            player.vy -= CONSTANTS.GRAVITY * 0.8; 
        }

        // 4. Apply Drag/Friction
        player.vx *= 0.98;
        player.vy *= 0.99;
        
        // Calculate dynamic speeds based on current score (gradual increase)
        let dynamicSpeedGoal = Math.min(CONSTANTS.MAX_FORWARD_SPEED, CONSTANTS.BASE_FORWARD_SPEED + (score * 0.015));
        let dynamicMaxSpeed = Math.min(CONSTANTS.ABSOLUTE_MAX_SPEED, CONSTANTS.BASE_MAX_SPEED + (score * 0.03));
        
        // 5. Force forward momentum if player gets too slow
        if (player.vx < dynamicSpeedGoal && (!isInputDown || !activeAnchor)) {
            player.vx += 0.15; // Gentler acceleration
        }

        // 6. Velocity Clamping (Prevent physics explosions)
        let currentSpeed = Math.hypot(player.vx, player.vy);
        if (currentSpeed > dynamicMaxSpeed) {
            let ratio = dynamicMaxSpeed / currentSpeed;
            player.vx *= ratio;
            player.vy *= ratio;
        }

        // 7. Apply Velocity to Position
        player.x += player.vx;
        player.y += player.vy;

        // 8. Camera Logic (Smooth follow, adjusted for mobile portrait)
        let cameraOffset = width > height ? 0.25 : 0.35; // Center player more on portrait mobile
        let targetCameraX = player.x - width * cameraOffset;
        cameraX += (targetCameraX - cameraX) * 0.1;

        // 9. Score Tracking
        let currentDistance = Math.floor(player.x / 100);
        if (currentDistance > score) {
            score = currentDistance;
            scoreHUD.innerText = score;
        }

        // 10. Memory Management & Endless Generation
        // Remove anchors that are safely behind the camera
        if (anchors.length > 0 && anchors[0].x < cameraX - 200) {
            anchors.shift();
            // Generate a new one ahead based on the last anchor's position
            let lastX = anchors.length > 0 ? anchors[anchors.length - 1].x : player.x;
            generateAnchor(lastX + CONSTANTS.ANCHOR_SPACING_MIN + Math.random() * (CONSTANTS.ANCHOR_SPACING_MAX - CONSTANTS.ANCHOR_SPACING_MIN));
        }

        // 11. Fatal Collisions
        // Ceiling / Floor
        if (player.y - player.size/2 <= CONSTANTS.BORDER_HEIGHT || 
            player.y + player.size/2 >= height - CONSTANTS.BORDER_HEIGHT) {
            gameOver();
        }
        
        // Falling too far left (off camera)
        if (player.x + player.size/2 < cameraX) {
            gameOver();
        }
    }

    // --- Rendering ---
    function draw() {
        ctx.fillStyle = '#e5e5e5';
        ctx.fillRect(0, 0, width, height);

        if (gameState === 'START') return;

        ctx.save();
        ctx.translate(-cameraX, 0);

        // Draw Anchors
        for (let a of anchors) {
            // Highlight the anchor the player can grab or is grabbing
            if (a === activeAnchor) {
                ctx.fillStyle = '#ff4d4d'; // Active red
            } else if (a === nearestAnchor && !isInputDown) {
                ctx.fillStyle = '#8a2be2'; // Target purple
                // Draw max range circle
                ctx.beginPath();
                ctx.arc(a.x, a.y, CONSTANTS.MAX_ROPE_LENGTH, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(138, 43, 226, 0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
            } else {
                ctx.fillStyle = '#555'; // Standard grey
            }
            ctx.fillRect(a.x - 8, a.y - 8, 16, 16);
        }

        // Draw Rope
        if (isInputDown && activeAnchor) {
            ctx.beginPath();
            ctx.moveTo(player.x, player.y);
            ctx.lineTo(activeAnchor.x, activeAnchor.y);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
        
        // Player Eyes
        ctx.fillStyle = '#111';
        let lookX = player.vx > 0 ? 4 : -4;
        ctx.fillRect(player.x + lookX + 2, player.y - 5, 4, 4);
        ctx.fillRect(player.x + lookX - 4, player.y - 5, 4, 4);

        ctx.restore();

        // Draw Static Hazards (Teeth Borders)
        ctx.fillStyle = '#ff7b6b';
        ctx.fillRect(0, 0, width, CONSTANTS.BORDER_HEIGHT);
        ctx.fillRect(0, height - CONSTANTS.BORDER_HEIGHT, width, CONSTANTS.BORDER_HEIGHT);
        
        ctx.fillStyle = '#e5e5e5';
        let toothWidth = 40;
        let totalTeeth = Math.ceil(width / toothWidth) + 1;
        for(let i = 0; i < totalTeeth; i++) {
            let offset = (cameraX % toothWidth);
            ctx.fillRect((i*toothWidth) - offset + 10, CONSTANTS.BORDER_HEIGHT - 10, 20, 10);
            ctx.fillRect((i*toothWidth) - offset + 10, height - CONSTANTS.BORDER_HEIGHT, 20, 10);
        }
    }

    // --- Game Loop (Fixed Timestep) ---
    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        
        // Calculate delta time
        let frameTime = timestamp - lastTime;
        lastTime = timestamp;

        // Cap frameTime to prevent 'spiral of death' if browser tabs away
        if (frameTime > 250) frameTime = 250; 
        
        accumulator += frameTime;
        
        // Run physics at exactly 60 updates per second, regardless of screen refresh rate
        while (accumulator >= CONSTANTS.FIXED_TIME_STEP) {
            update();
            accumulator -= CONSTANTS.FIXED_TIME_STEP;
        }
        
        draw();
        
        if (gameState !== 'GAMEOVER') {
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    }
    
    // Initial draw for background
    draw();
</script>
</body>
</html>
